# CD — reusable workflow (called by pipeline.yml; not triggered on its own).
# Mirrors the L1 loop's order — TEST, THEN SHIP: eval-gate the candidate first, and only deploy a
# new revision of the single Agent Engine if it clears the threshold. Then a manual production-
# approval gate (best practice).
#
# IDEMPOTENT: every run updates the SAME engine in place (new revision) — reproducible, no extra
# engines. Single project/env, so 'production' is the human sign-off, NOT a second deploy
# (re-deploying the same engine back-to-back caused the earlier update conflict, code 13).
# The managed eval scores the LOCAL candidate (run_inference on the local agent), so it can gate
# BEFORE the deploy — a regression never reaches the engine. Keyless auth via WIF (inputs below).
name: CD

on:
  workflow_call:
    inputs:
      project_id:                 { required: true, type: string }
      region:                     { required: true, type: string }
      agent_dir:                  { required: true, type: string }
      workload_identity_provider: { required: true, type: string }
      service_account:            { required: true, type: string }

permissions:
  contents: read
  id-token: write   # keyless WIF

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          project_id: ${{ inputs.project_id }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Install managed-eval deps (client.evals needs the [evaluation] extra)
        run: pip install 'google-cloud-aiplatform[evaluation]'   # adds tqdm/sklearn/litellm/… for the already-pinned aiplatform
      - name: Eval gate (test the candidate BEFORE deploying — mirrors the L1 loop)
        env:
          AGENT_DIR: ${{ inputs.agent_dir }}
        run: |
          python eval_tool/run_eval.py --engine managed --agent-dir "$AGENT_DIR" --out /tmp/eval.json
          python - <<'PY'
          import json, os
          ad = os.environ["AGENT_DIR"]
          result = json.load(open("/tmp/eval.json"))
          criteria = json.load(open(f"{ad}/eval/criteria.json"))
          threshold = ((criteria.get("criteria") or {})
                       .get("rubric_based_final_response_quality_v1") or {}).get("threshold", 0.8)
          frq = result.get("final_response_quality", 0.0)
          print(f"final_response_quality={frq} threshold={threshold}")
          raise SystemExit(0 if frq >= threshold else 1)   # non-zero -> stop, do NOT deploy
          PY
      - name: Deploy a new revision (source/container, update-in-place) — only if the gate passed
        run: python deployment/deploy_agent.py --source --project "${{ inputs.project_id }}" --region "${{ inputs.region }}" --agent-dir "${{ inputs.agent_dir }}"
      - name: Agent Identity & least-privilege (described)
        run: |
          echo "Agent Identity (SPIFFE) is auto-issued at deploy; the static least-privilege"
          echo "lint already ran in CI (tests/test_identity.py). Runtime SPIFFE verification"
          echo "needs the live agent (a partly-Preview surface) — see NB6."

  promote-production:
    needs: deploy
    runs-on: ubuntu-latest
    environment: production   # add a "required reviewers" rule -> the manual approval gate (best practice)
    steps:
      - name: Production approval (manual gate)
        run: |
          echo "Manual production approval recorded (best-practice gate)."
          echo "Single project/env: the new revision deployed + eval-gated by 'deploy' is already"
          echo "serving, so this step is the human sign-off — NOT a second deploy (re-deploying the"
          echo "same engine back-to-back caused the earlier update conflict). In a multi-project"
          echo "setup, this job would deploy to the production project."
