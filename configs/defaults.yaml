# Project-wide settings for the Agent Ops L1 repo.
# Read by Terraform (terraform/main.tf yamldecode) and the runtime scripts.
# Keep secrets OUT of this file.
#
# Per-agent config (model, eval policy, monitor thresholds, canary %) lives in
# each agent's own file: agents/<name>/agent.yaml. Add an agent by creating a new
# agents/<name>/ folder — Terraform discovers it via fileset() and the engine
# scripts target it with --agent-dir. Nothing agent-specific belongs here.

project:
  id: sandbox-401718        # GCP project id
  region: us-central1

# Global fallbacks, applied when an agent.yaml omits the field. These mirror the
# try() defaults in terraform/modules/agent_ops/main.tf — keep them in sync.
defaults:
  model: gemini-2.5-flash
  eval:
    engine: managed         # default scoring backend: "managed" (GCP Agent Evaluation) or "local" (ADK)
    location: global        # eval/judge endpoint
    policy: match           # "match" within the noise band, or "beat"
    bootstrap_resamples: 2000
  monitor:
    drift_threshold: 0.7    # rolling 1h mean Final Response Quality below this fires the loop
  deploy:
    canary_traffic: 10      # percent routed to a new revision on deploy

# CI/CD inputs, read by cicd/wif.tf (the WIF/Artifact-Registry Terraform). Not secrets —
# github_repo is just "owner/repo". Leave blank until you wire CI/CD; wif.tf requires it.
cicd:
  github_repo: "behardja/agent-ops-maturity"           # e.g. my-org/agent-ops-maturity
